# ═══════════════════════════════════════════
# XBot Docker Compose
# One command: docker-compose up -d
# ═══════════════════════════════════════════

services:
  xbot:
    build: .
    container_name: xbot
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - API_PORT=3000
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      # Persist SQLite database outside container
      - xbot-data:/app/data
      # Optional: mount .env from host
      # - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  xbot-data:
    driver: local
